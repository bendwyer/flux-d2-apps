---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: metadata-comics
  namespace: books
spec:
  schedule: "30 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: comictagger
              image: ghcr.io/bendwyer/containers/comictagger:1.6@sha256:bf5552b2f546f62212390fc2c229a0dafeed59447382cec339863b81a51b063c
              command: ["sh", "-c"]
              args:
                - |
                  umask 022
                  ls /books/incoming/comics/*.cbz >/dev/null 2>&1 || { echo "No .cbz files to process"; exit 0; }
                  for f in /books/incoming/comics/*.cbz; do
                    echo "Processing: $f"
                    if comictagger \
                      --no-gui \
                      -s \
                      -o \
                      -f \
                      --tags-write cr \
                      --source comicvine \
                      --comicvine-key "$(cat /secret/credential)" \
                      --config /config \
                      "$f"; then
                      comictagger \
                        --no-gui \
                        -r \
                        --tags-read cr \
                        --move \
                        --dir /books/library/comics \
                        --template "{series} ({year})/{series} #{issue} ({year})" \
                        --config /config \
                        "$f" || echo "Warning: Tagged but failed to rename: $f"
                    else
                      echo "Skipped (no match): $f"
                    fi
                  done
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 512Mi
              volumeMounts:
                - name: comicvine-secret
                  mountPath: /secret
                  readOnly: true
                - name: config
                  mountPath: /config
                - name: tmp
                  mountPath: /tmp
                - name: library
                  mountPath: /books
          volumes:
            - name: comicvine-secret
              secret:
                secretName: comicvine-credentials
            - name: config
              emptyDir: {}
            - name: tmp
              emptyDir: {}
            - name: library
              persistentVolumeClaim:
                claimName: library-shared-pvc
