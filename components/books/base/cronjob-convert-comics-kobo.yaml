---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: convert-comics-kobo
  namespace: books
spec:
  schedule: "15 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: epub2cbz
              image: ghcr.io/bendwyer/containers/epub2cbz:2.1@sha256:12ab217483477daddd0f102ed40683b4dfe701936b2e383518a0080cf4b8dbfe
              command: ["python3", "/app/epub2cbz.py"]
              args:
                - --input-dir
                - /books/sources/kobo
                - --output-dir
                - /books/incoming/comics
                - --min-size
                - "50"
                - --marker-dir
                - /books/markers/comics
                - --include-pattern
                - \bOmnibus\b
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 512Mi
              volumeMounts:
                - name: library
                  mountPath: /books
          volumes:
            - name: library
              persistentVolumeClaim:
                claimName: library-shared-pvc
