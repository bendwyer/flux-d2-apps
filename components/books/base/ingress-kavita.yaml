---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kavita
  namespace: books
  annotations:
    tailscale.com/proxy-group: shared-ingress
    tailscale.com/tags: tag:k8s-shared
    tailscale.com/http-redirect: "true"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Kavita"
    gethomepage.dev/group: "Apps"
    gethomepage.dev/icon: "kavita.png"
    gethomepage.dev/href: "https://kavita.tail0c49c.ts.net"

spec:
  ingressClassName: tailscale
  tls:
    - hosts:
        - kavita
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kavita
                port:
                  name: http
