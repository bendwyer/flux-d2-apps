---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: filebrowser
  namespace: books
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: bjw-s
  values:
    controllers:
      filebrowser:
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
        containers:
          app:
            args:
              - --root=/books
              - --noauth
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
            image:
              repository: filebrowser/filebrowser
              tag: "v2.63.10@sha256:b0308060fb45b7767f7cf4a21d40e5e0152bad798794907769288a7a12436895"
              pullPolicy: IfNotPresent
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                memory: 128Mi
            probes:
              liveness:
                enabled: true
                type: HTTP
                path: /health
                port: 80
                spec:
                  initialDelaySeconds: 10
                  periodSeconds: 10
              readiness:
                enabled: true
                type: HTTP
                path: /health
                port: 80
                spec:
                  initialDelaySeconds: 5
                  periodSeconds: 5
    service:
      filebrowser:
        controller: filebrowser
        ports:
          http:
            port: 80
    persistence:
      books:
        enabled: true
        existingClaim: library-shared-pvc
        globalMounts:
          - path: /books
