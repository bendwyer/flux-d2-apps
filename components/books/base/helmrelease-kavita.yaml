---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kavita
  namespace: books
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: bjw-s
  values:
    controllers:
      kavita:
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            fsGroup: 1000
        containers:
          app:
            image:
              repository: ghcr.io/kareadita/kavita
              tag: "0.8.9@sha256:1f2acae7466d022f037ea09f7989eb7c487f916b881174c7a6de33dbfa8acb39"
              pullPolicy: IfNotPresent
            env:
              TZ: Europe/Berlin
            resources:
              requests:
                cpu: 100m
                memory: 1.5Gi
              limits:
                memory: 1.5Gi
            probes:
              liveness:
                enabled: true
                type: HTTP
                path: /api/health
                port: 5000
                spec:
                  initialDelaySeconds: 30
                  periodSeconds: 10
              readiness:
                enabled: true
                type: HTTP
                path: /api/health
                port: 5000
                spec:
                  initialDelaySeconds: 5
                  periodSeconds: 5
    service:
      kavita:
        controller: kavita
        ports:
          http:
            port: 5000
    persistence:
      config:
        enabled: true
        existingClaim: kavita-config-pvc
        globalMounts:
          - path: /kavita/config
      cache:
        enabled: true
        existingClaim: kavita-cache-pvc
        globalMounts:
          - path: /kavita/config/cache
      library:
        enabled: true
        existingClaim: library-shared-pvc
        globalMounts:
          - path: /books
