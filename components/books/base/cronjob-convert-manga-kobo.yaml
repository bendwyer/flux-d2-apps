---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: convert-manga-kobo
  namespace: books
spec:
  schedule: "15 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: epub2cbz
              image: ghcr.io/bendwyer/containers/epub2cbz:1.0.2@sha256:38d78cd50d035ef1ea574be4f7902666a931abbae82fb697487319126cb36e19
              command: ["python3", "/app/epub2cbz.py"]
              args:
                - --input-dir
                - /books/sources/kobo
                - --output-dir
                - /books/incoming/manga
                - --min-size
                - "50"
                - --marker-dir
                - /books/markers/manga
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 512Mi
              volumeMounts:
                - name: library
                  mountPath: /books
          volumes:
            - name: library
              persistentVolumeClaim:
                claimName: library-shared-pvc
