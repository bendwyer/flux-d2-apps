---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: metadata-manga
  namespace: books
spec:
  schedule: "30 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: comictagger
              image: ghcr.io/bendwyer/containers/comictagger:1.6@sha256:c2460eb03f3dadec0e102c8ecc3babc4832259ce6bb4bd54aaeb45ac1c5b3239
              command: ["sh", "-c"]
              args:
                - |
                  ls /books/incoming/manga/*.cbz >/dev/null 2>&1 || { echo "No .cbz files to process"; exit 0; }
                  for f in /books/incoming/manga/*.cbz; do
                    echo "Processing: $f"
                    if comictagger \
                      --no-gui \
                      -s \
                      -o \
                      -f \
                      --tags-write cr \
                      --source mangabaka \
                      --mangabaka-age-filter pornographic \
                      --config /config \
                      "$f"; then
                      comictagger \
                        --no-gui \
                        -r \
                        --tags-read cr \
                        --move \
                        --dir /books/library/manga \
                        --template "{series}/{series} #{issue} ({year})" \
                        --config /config \
                        "$f" || echo "Warning: Tagged but failed to rename: $f"
                    else
                      echo "Skipped (no match): $f"
                    fi
                  done
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 512Mi
              volumeMounts:
                - name: config
                  mountPath: /config
                - name: tmp
                  mountPath: /tmp
                - name: library
                  mountPath: /books
          volumes:
            - name: config
              emptyDir: {}
            - name: tmp
              emptyDir: {}
            - name: library
              persistentVolumeClaim:
                claimName: library-shared-pvc
