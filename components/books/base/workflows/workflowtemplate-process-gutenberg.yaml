---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: process-gutenberg
  namespace: books
spec:
  serviceAccountName: argo-workflow
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  entrypoint: main
  # Gutenberg is manual-ingestion (user drops files into
  # /books/sources/project-gutenberg/) and tiny (~4 MB). No ephemeral scratch
  # PVC, no semaphore — operates directly on the shared library PVC.
  volumes:
    - name: library
      persistentVolumeClaim:
        claimName: library-shared-pvc
    - name: tmp
      emptyDir: {}
  templates:
    - name: main
      dag:
        tasks:
          - name: metadata
            template: metadata
          - name: archive
            template: archive
            dependencies: [metadata]

    - name: metadata
      container:
        image: ghcr.io/bendwyer/containers/ebook-metadata:2.0.2
        args:
          - --input-dir
          - /books/sources/project-gutenberg
          - --output-dir
          - /books/library/ebooks
          # Tool markers on the pod-ephemeral tmp volume. The archive step
          # deletes sources after successful verify, so absence of source
          # IS the "done" signal — no persistent marker needed.
          - --marker-dir
          - /tmp/markers/project-gutenberg
          - --provider
          - goodreads
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi
        volumeMounts:
          - name: library
            mountPath: /books
          - name: tmp
            mountPath: /tmp

    - name: archive
      container:
        image: rclone/rclone:1.73.5
        command: ["sh", "-c"]
        args:
          - |
            set -eu
            src=/books/sources/project-gutenberg
            if [ ! -d "$src" ] || [ -z "$(ls -A "$src" 2>/dev/null)" ]; then
              echo "No source files to archive"
              exit 0
            fi
            count=$(find "$src" -mindepth 1 -maxdepth 1 -type f | wc -l)
            dest="archive:$ARCHIVE_BUCKET/books/project-gutenberg/"
            echo "[archive] $count files: $src -> $dest"
            # Bulk copy + bulk check. `rclone check` wants directory args; a
            # per-file loop with file-path destinations fails with "is a file
            # not a directory".
            rclone copy "$src" "$dest" \
              --s3-no-check-bucket \
              --s3-storage-class=STANDARD_IA \
              --stats-one-line --stats=30s
            rclone check "$src" "$dest" --one-way
            # Delete locals only after verify passes. `set -eu` aborts above
            # on any non-zero exit, so we never reach this on failure.
            # Absence of source is the "done" signal — no marker needed.
            find "$src" -mindepth 1 -maxdepth 1 -type f -delete
            echo "archived and removed $count gutenberg files"
        env:
          - name: RCLONE_CONFIG_ARCHIVE_TYPE
            value: "s3"
          - name: RCLONE_CONFIG_ARCHIVE_PROVIDER
            value: "Other"
          - name: RCLONE_CONFIG_ARCHIVE_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: ovhcloud-archive-home-s3
                key: access_key
          - name: RCLONE_CONFIG_ARCHIVE_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: ovhcloud-archive-home-s3
                key: secret_key
          - name: RCLONE_CONFIG_ARCHIVE_ENDPOINT
            valueFrom:
              secretKeyRef:
                name: ovhcloud-archive-home-s3
                key: endpoint
          - name: RCLONE_CONFIG_ARCHIVE_REGION
            valueFrom:
              secretKeyRef:
                name: ovhcloud-archive-home-s3
                key: region
          - name: ARCHIVE_BUCKET
            valueFrom:
              secretKeyRef:
                name: ovhcloud-archive-home-s3
                key: bucket
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi
        volumeMounts:
          - name: library
            mountPath: /books
