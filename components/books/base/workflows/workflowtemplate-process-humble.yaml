---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: process-humble
  namespace: books
spec:
  serviceAccountName: argo-workflow
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  entrypoint: main
  # Tiered TTL: successful runs clean up fast; failed runs persist longer
  # for debugging. Scratch PVC is GC'd via ownerReference cascade when the
  # Workflow is deleted — no explicit delete step required.
  ttlStrategy:
    secondsAfterSuccess: 900       # 15 min on green run
    secondsAfterFailure: 14400     # 4 hrs for debugging
    secondsAfterCompletion: 86400  # catch-all, 24 hrs
  synchronization:
    semaphores:
      - configMapKeyRef:
          name: books-workflow-semaphore
          key: processing
  arguments:
    parameters:
      - name: bundle_key
        description: Humble bundle URL key (from `humble-cli list` KEY column).
      - name: lane
        description: "Destination lane: manga, comics, or ebook."
        enum: ["manga", "comics", "ebook"]
      - name: formats
        description: |
          Pipe-separated list of humble-cli format names to download.
          Default covers pdf+epub for all scenarios. Override for bundles
          where you want a specific format (e.g. "cbz" for smaller comics,
          "epub|epub (hq)" for ebook-only). Pipe separator is required
          because format names like "pdf (hq)" contain spaces.
        value: "pdf|pdf (hq)|epub|epub (hq)"
  # bundle_name and scratch_size are auto-derived by the `resolve` task at
  # runtime. bundle_name comes from parsing humble-cli list for the given
  # bundle_key; scratch_size is the bundle's total-of-all-formats size × 1.5
  # rounded up to GiB, minimum 2Gi. This is conservative (over-provisions
  # scratch when `formats` narrows the download) but longhorn-scratch is
  # single-replica so the over-allocation is cheap.
  # Scratch PVC is created dynamically via the `resource` template action
  # (see `create-scratch-pvc`) so the size can be parameterized.
  # volumeClaimTemplates does NOT support parameter substitution on the
  # storage field — K8s validates the quantity regex before Argo substitutes.
  # setOwnerReference: true ties the PVC lifecycle to the Workflow — when
  # the Workflow is GC'd per ttlStrategy above, the PVC cascades. No
  # explicit delete step: synchronous kubectl-delete blocked on PVC
  # finalizers can hang unpredictably and stall workflow completion.
  volumes:
    - name: library
      persistentVolumeClaim:
        claimName: library-shared-pvc
    - name: tmp
      emptyDir: {}
    - name: config
      emptyDir: {}
    - name: humble-secret
      secret:
        secretName: humble-credentials
    - name: comicvine-secret
      secret:
        secretName: comicvine-credentials
  templates:
    - name: main
      inputs:
        parameters:
          - name: bundle_key
          - name: lane
          - name: formats
      dag:
        tasks:
          - name: resolve
            template: resolve
            arguments:
              parameters:
                - name: bundle_key
                  value: "{{inputs.parameters.bundle_key}}"
          - name: create-scratch-pvc
            dependencies: [resolve]
            template: create-scratch-pvc
            arguments:
              parameters:
                - name: scratch_size
                  value: "{{tasks.resolve.outputs.parameters.scratch_size}}"
          - name: sync
            dependencies: [create-scratch-pvc]
            template: sync
            arguments:
              parameters:
                - name: bundle_key
                  value: "{{inputs.parameters.bundle_key}}"
                - name: formats
                  value: "{{inputs.parameters.formats}}"
                - name: pvc_name
                  value: "{{tasks.create-scratch-pvc.outputs.parameters.pvc_name}}"
          - name: convert-manga
            dependencies: [sync]
            template: convert-manga
            when: "'{{inputs.parameters.lane}}' == 'manga'"
            arguments:
              parameters:
                - name: bundle_name
                  value: "{{tasks.sync.outputs.parameters.bundle_name}}"
                - name: pvc_name
                  value: "{{tasks.create-scratch-pvc.outputs.parameters.pvc_name}}"
          - name: convert-comics
            dependencies: [sync]
            template: convert-comics
            when: "'{{inputs.parameters.lane}}' == 'comics'"
            arguments:
              parameters:
                - name: bundle_name
                  value: "{{tasks.sync.outputs.parameters.bundle_name}}"
                - name: pvc_name
                  value: "{{tasks.create-scratch-pvc.outputs.parameters.pvc_name}}"
          - name: metadata-manga
            dependencies: [convert-manga]
            template: metadata-manga
            when: "'{{inputs.parameters.lane}}' == 'manga'"
            arguments:
              parameters:
                - name: pvc_name
                  value: "{{tasks.create-scratch-pvc.outputs.parameters.pvc_name}}"
          - name: metadata-comics
            dependencies: [convert-comics]
            template: metadata-comics
            when: "'{{inputs.parameters.lane}}' == 'comics'"
            arguments:
              parameters:
                - name: pvc_name
                  value: "{{tasks.create-scratch-pvc.outputs.parameters.pvc_name}}"
          - name: metadata-ebook
            dependencies: [sync]
            template: metadata-ebook
            when: "'{{inputs.parameters.lane}}' == 'ebook'"
            arguments:
              parameters:
                - name: bundle_name
                  value: "{{tasks.sync.outputs.parameters.bundle_name}}"
                - name: pvc_name
                  value: "{{tasks.create-scratch-pvc.outputs.parameters.pvc_name}}"
          - name: archive
            dependencies: [metadata-manga, metadata-comics, metadata-ebook]
            template: archive
            arguments:
              parameters:
                - name: bundle_name
                  value: "{{tasks.sync.outputs.parameters.bundle_name}}"
                - name: pvc_name
                  value: "{{tasks.create-scratch-pvc.outputs.parameters.pvc_name}}"

    # resolve: look up the bundle in `humble-cli list` by its key; emit
    # bundle_name (dir slug) and scratch_size as output parameters for
    # downstream tasks. No scratch PVC yet — runs on /tmp only.
    - name: resolve
      inputs:
        parameters:
          - name: bundle_key
      container:
        image: ghcr.io/bendwyer/containers/humble-cli:0.23@sha256:5a38dcec9ae925a44c9a6e6a1eadc7160ff175b753f722278d1f3e3a005c0870
        command: ["sh", "-c"]
        args:
          - |
            set -eu
            umask 022
            export HOME=/tmp
            humble-cli auth "$(cat /secret/credential)"
            humble-cli list > /tmp/all.txt

            # humble-cli list table uses box-drawing "│" as column separator.
            # Columns: KEY, NAME, SIZE, CLAIMED. Find the row matching bundle_key
            # and extract name + size.
            row=$(awk -F'│' -v k="{{inputs.parameters.bundle_key}}" '{
              gsub(/^ +| +$/, "", $2)
              if ($2 == k) {
                for (i = 2; i <= NF; i++) {
                  gsub(/^ +| +$/, "", $i)
                  printf "%s\t", $i
                }
                print ""
              }
            }' /tmp/all.txt)

            if [ -z "$row" ]; then
              echo "ERROR: bundle not found: {{inputs.parameters.bundle_key}}"
              echo "---"
              head -5 /tmp/all.txt
              exit 1
            fi

            name=$(printf '%s' "$row" | cut -f2)
            size=$(printf '%s' "$row" | cut -f3)

            # Convert size (e.g. "45.9 GiB" / "112.1 MiB") to GiB × 1.5,
            # rounded up, minimum 2Gi.
            unit=$(printf '%s' "$size" | awk '{print $2}')
            value=$(printf '%s' "$size" | awk '{print $1}')
            case "$unit" in
              MiB|MB) mib=$(awk -v v="$value" 'BEGIN{printf "%.0f", v}') ;;
              GiB|GB) mib=$(awk -v v="$value" 'BEGIN{printf "%.0f", v*1024}') ;;
              TiB|TB) mib=$(awk -v v="$value" 'BEGIN{printf "%.0f", v*1024*1024}') ;;
              *)      echo "ERROR: unknown size unit: $unit"; exit 1 ;;
            esac
            scratch_gi=$(awk -v m="$mib" 'BEGIN{
              need_mib = m * 1.5
              g = int((need_mib + 1023) / 1024)
              if (g < 2) g = 2
              print g
            }')

            echo "resolved:"
            echo "  bundle_name (from list): $name"
            echo "  bundle_size: $size"
            echo "  scratch_size: ${scratch_gi}Gi"
            echo "  (actual on-disk bundle_name will be emitted by sync"
            echo "   after bulk-download; humble-cli sanitizes some chars"
            echo "   like ':' in the real dir slug)"

            printf '%s' "${scratch_gi}Gi" > /tmp/scratch_size.txt
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 256Mi
        volumeMounts:
          - name: humble-secret
            mountPath: /secret
            readOnly: true
          - name: tmp
            mountPath: /tmp
      outputs:
        parameters:
          - name: scratch_size
            valueFrom:
              path: /tmp/scratch_size.txt

    - name: create-scratch-pvc
      inputs:
        parameters:
          - name: scratch_size
      resource:
        action: create
        setOwnerReference: true
        manifest: |
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            generateName: humble-scratch-
            namespace: books
          spec:
            accessModes: [ReadWriteOnce]
            storageClassName: longhorn-scratch
            resources:
              requests:
                storage: "{{inputs.parameters.scratch_size}}"
      outputs:
        parameters:
          - name: pvc_name
            valueFrom:
              jsonPath: '{.metadata.name}'

    - name: sync
      inputs:
        parameters:
          - name: bundle_key
          - name: formats
          - name: pvc_name
      volumes:
        - name: scratch
          persistentVolumeClaim:
            claimName: "{{inputs.parameters.pvc_name}}"
      container:
        image: ghcr.io/bendwyer/containers/humble-cli:0.23@sha256:5a38dcec9ae925a44c9a6e6a1eadc7160ff175b753f722278d1f3e3a005c0870
        command: ["sh", "-c"]
        args:
          - |
            set -eu
            umask 022
            export HOME=/tmp
            humble-cli auth "$(cat /secret/credential)"
            mkdir -p /scratch/sources/humble-bundle
            cd /scratch/sources/humble-bundle
            echo "{{inputs.parameters.bundle_key}}" > /tmp/bundles.txt

            # Parse pipe-separated `formats` into multiple --format flags.
            # Pipe separator because format names ("pdf (hq)") contain
            # spaces. Assign Argo's substitution to a single-quoted variable
            # first — if we used `set -- {{inputs.parameters.formats}}`
            # directly, the shell would parse "(hq)" as subshell syntax at
            # parse time, before any variable expansion. Via a variable,
            # parens are literal chars in the expanded value. `set -f`
            # disables globbing just in case.
            formats_raw='{{inputs.parameters.formats}}'
            set -f
            IFS='|'
            set -- $formats_raw
            unset IFS
            set +f
            cmd="humble-cli bulk-download /tmp/bundles.txt"
            for fmt in "$@"; do
              esc=$(printf '%s' "$fmt" | sed "s/'/'\\\\''/g")
              cmd="$cmd --format '$esc'"
            done
            echo "running: $cmd"
            eval "$cmd"

            # Detect the actual bundle directory humble-cli created.
            # humble-cli sanitizes some characters (e.g. ":" becomes "  ") so
            # the list-output name is not always the filesystem slug. Read
            # the real slug from /scratch and emit it as an output param so
            # downstream tasks work against the correct path.
            dirs=$(find /scratch/sources/humble-bundle -mindepth 1 -maxdepth 1 -type d | wc -l)
            if [ "$dirs" -eq 0 ]; then
              echo "ERROR: bulk-download completed but created no directory"
              exit 1
            fi
            if [ "$dirs" -gt 1 ]; then
              echo "ERROR: bulk-download created $dirs directories — expected exactly 1"
              find /scratch/sources/humble-bundle -mindepth 1 -maxdepth 1 -type d
              exit 1
            fi
            bundle_dir=$(find /scratch/sources/humble-bundle -mindepth 1 -maxdepth 1 -type d)
            bundle_name=$(basename "$bundle_dir")
            echo "detected bundle_name: $bundle_name"
            printf '%s' "$bundle_name" > /tmp/bundle_name.txt
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi
        volumeMounts:
          - name: humble-secret
            mountPath: /secret
            readOnly: true
          - name: tmp
            mountPath: /tmp
          - name: scratch
            mountPath: /scratch
      outputs:
        parameters:
          - name: bundle_name
            valueFrom:
              path: /tmp/bundle_name.txt

    - name: convert-manga
      inputs:
        parameters:
          - name: bundle_name
          - name: pvc_name
      volumes:
        - name: scratch
          persistentVolumeClaim:
            claimName: "{{inputs.parameters.pvc_name}}"
      container:
        image: ghcr.io/ciromattia/kcc:v9.7.2
        command: ["sh", "-c"]
        env:
          - name: BUNDLE_NAME
            value: "{{inputs.parameters.bundle_name}}"
        args:
          - |
            umask 022
            find "/scratch/sources/humble-bundle/$BUNDLE_NAME" -name '*.pdf' | head -1 | grep -q . || { echo "No .pdf files to process"; exit 0; }
            mkdir -p /scratch/incoming/manga
            find "/scratch/sources/humble-bundle/$BUNDLE_NAME" -name '*.pdf' | while read -r pdf; do
              parent_name=$(basename "$(dirname "$pdf")")
              output_name=$(printf '%s' "$parent_name" | sed -E '
                s/  +.*$//
                s/ (Volume|Vol) ?\.? ?([0-9]+)$/ \2/
              ')
              if ! echo "$output_name" | grep -qE ' [0-9]+$'; then
                output_name="${output_name} 1"
              fi
              echo "Converting: $pdf -> ${output_name}.cbz"
              pdf_basename=$(basename "$pdf" .pdf)
              c2e -n -f CBZ -o /scratch/incoming/manga "$pdf" && \
              mv "/scratch/incoming/manga/${pdf_basename}.cbz" "/scratch/incoming/manga/${output_name}.cbz"
            done
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 100m
            memory: 4Gi
          limits:
            memory: 4Gi
        volumeMounts:
          - name: tmp
            mountPath: /tmp
          - name: scratch
            mountPath: /scratch

    - name: convert-comics
      inputs:
        parameters:
          - name: bundle_name
          - name: pvc_name
      volumes:
        - name: scratch
          persistentVolumeClaim:
            claimName: "{{inputs.parameters.pvc_name}}"
      container:
        image: ghcr.io/ciromattia/kcc:v9.7.2
        command: ["sh", "-c"]
        env:
          - name: BUNDLE_NAME
            value: "{{inputs.parameters.bundle_name}}"
        args:
          - |
            umask 022
            find "/scratch/sources/humble-bundle/$BUNDLE_NAME" -name '*.pdf' | head -1 | grep -q . || { echo "No .pdf files to process"; exit 0; }
            mkdir -p /scratch/incoming/comics
            find "/scratch/sources/humble-bundle/$BUNDLE_NAME" -name '*.pdf' | while read -r pdf; do
              if ls "$(dirname "$pdf")"/*HQ*.pdf >/dev/null 2>&1 && \
                 ! echo "$(basename "$pdf")" | grep -qi 'HQ'; then
                echo "Skipping non-HQ: $pdf (HQ version available)"
                continue
              fi
              parent_name=$(basename "$(dirname "$pdf")")
              if echo "$parent_name" | grep -qE ' (Vol|Volume) ?\.? ?[0-9]+  '; then
                output_name=$(printf '%s' "$parent_name" | sed -E '
                  s/  +.*$//
                  s/ (Volume|Vol) ?\.? ?([0-9]+)$/ \2/
                ')
              else
                output_name=$(printf '%s' "$parent_name" | sed -E '
                  s/  +/ /g
                  s/ #0*([0-9]+).*$/ \1/
                  s/ (Volume|Vol) ?\.? ?([0-9]+)$/ \2/
                ')
              fi
              if ! echo "$output_name" | grep -qE ' [0-9]+$'; then
                output_name="${output_name} 1"
              fi
              echo "Converting: $pdf -> ${output_name}.cbz"
              pdf_basename=$(basename "$pdf" .pdf)
              c2e -n -f CBZ -o /scratch/incoming/comics "$pdf" && \
              mv "/scratch/incoming/comics/${pdf_basename}.cbz" "/scratch/incoming/comics/${output_name}.cbz"
            done
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 100m
            memory: 4Gi
          limits:
            memory: 4Gi
        volumeMounts:
          - name: tmp
            mountPath: /tmp
          - name: scratch
            mountPath: /scratch

    - name: metadata-manga
      inputs:
        parameters:
          - name: pvc_name
      volumes:
        - name: scratch
          persistentVolumeClaim:
            claimName: "{{inputs.parameters.pvc_name}}"
      container:
        image: ghcr.io/bendwyer/containers/comictagger:1.6@sha256:b95350b251921a224e59b7ffac9d0961f48d0142e66f8c058c386b3fdf162aa3
        command: ["sh", "-c"]
        args:
          - |
            umask 022
            ls /scratch/incoming/manga/*.cbz >/dev/null 2>&1 || { echo "No .cbz files to process"; exit 0; }
            for f in /scratch/incoming/manga/*.cbz; do
              echo "Processing: $f"
              if comictagger \
                --no-gui \
                -s -o -f \
                --tags-write cr \
                --source mangabaka \
                --mangabaka-age-filter pornographic \
                --config /config \
                "$f"; then
                comictagger \
                  --no-gui \
                  -r --tags-read cr --move \
                  --dir /books/library/manga \
                  --template "{series}/{series} #{issue} ({year})" \
                  --config /config \
                  "$f" || echo "Warning: Tagged but failed to rename: $f"
              else
                echo "MangaBaka miss, trying ComicVine fallback: $f"
                if comictagger \
                  --no-gui \
                  -s -o -f \
                  --tags-write cr \
                  --source comicvine \
                  --comicvine-key "$(cat /secret/credential)" \
                  --config /config \
                  "$f"; then
                  comictagger \
                    --no-gui \
                    -r --tags-read cr --move \
                    --dir /books/library/manga \
                    --template "{series}/{series} #{issue} ({year})" \
                    --config /config \
                    "$f" || echo "Warning: Tagged but failed to rename: $f"
                else
                  echo "Dead-letter (no match in either source): $f"
                  mkdir -p /books/incoming/manga/_unmatched
                  mv "$f" /books/incoming/manga/_unmatched/ || echo "Warning: failed to move to _unmatched: $f"
                fi
              fi
            done
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi
        volumeMounts:
          - name: comicvine-secret
            mountPath: /secret
            readOnly: true
          - name: config
            mountPath: /config
          - name: tmp
            mountPath: /tmp
          - name: scratch
            mountPath: /scratch
          - name: library
            mountPath: /books

    - name: metadata-comics
      inputs:
        parameters:
          - name: pvc_name
      volumes:
        - name: scratch
          persistentVolumeClaim:
            claimName: "{{inputs.parameters.pvc_name}}"
      container:
        image: ghcr.io/bendwyer/containers/comictagger:1.6@sha256:b95350b251921a224e59b7ffac9d0961f48d0142e66f8c058c386b3fdf162aa3
        command: ["sh", "-c"]
        args:
          - |
            umask 022
            ls /scratch/incoming/comics/*.cbz >/dev/null 2>&1 || { echo "No .cbz files to process"; exit 0; }
            for f in /scratch/incoming/comics/*.cbz; do
              echo "Processing: $f"
              if comictagger \
                --no-gui \
                -s -o -f \
                --tags-write cr \
                --source comicvine \
                --comicvine-key "$(cat /secret/credential)" \
                --config /config \
                "$f"; then
                comictagger \
                  --no-gui \
                  -r --tags-read cr --move \
                  --dir /books/library/comics \
                  --template "{series} ({year})/{series} #{issue} ({year})" \
                  --config /config \
                  "$f" || echo "Warning: Tagged but failed to rename: $f"
              else
                echo "Dead-letter (no ComicVine match): $f"
                mkdir -p /books/incoming/comics/_unmatched
                mv "$f" /books/incoming/comics/_unmatched/ || echo "Warning: failed to move to _unmatched: $f"
              fi
            done
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi
        volumeMounts:
          - name: comicvine-secret
            mountPath: /secret
            readOnly: true
          - name: config
            mountPath: /config
          - name: tmp
            mountPath: /tmp
          - name: scratch
            mountPath: /scratch
          - name: library
            mountPath: /books

    - name: metadata-ebook
      inputs:
        parameters:
          - name: bundle_name
          - name: pvc_name
      volumes:
        - name: scratch
          persistentVolumeClaim:
            claimName: "{{inputs.parameters.pvc_name}}"
      container:
        image: ghcr.io/bendwyer/containers/ebook-metadata:2.0.2
        env:
          - name: BUNDLE_NAME
            value: "{{inputs.parameters.bundle_name}}"
        args:
          - --input-dir
          - /scratch/sources/humble-bundle/$(BUNDLE_NAME)
          - --output-dir
          - /books/library/ebooks
          - --marker-dir
          - /scratch/markers/humble-ebook
          - --provider
          - goodreads
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi
        volumeMounts:
          - name: scratch
            mountPath: /scratch
          - name: library
            mountPath: /books
          - name: tmp
            mountPath: /tmp

    - name: archive
      inputs:
        parameters:
          - name: bundle_name
          - name: pvc_name
      volumes:
        - name: scratch
          persistentVolumeClaim:
            claimName: "{{inputs.parameters.pvc_name}}"
      container:
        image: rclone/rclone:1.73.5
        command: ["sh", "-c"]
        env:
          - name: BUNDLE_NAME
            value: "{{inputs.parameters.bundle_name}}"
          - name: RCLONE_CONFIG_ARCHIVE_TYPE
            value: "s3"
          - name: RCLONE_CONFIG_ARCHIVE_PROVIDER
            value: "Other"
          - name: RCLONE_CONFIG_ARCHIVE_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: ovhcloud-archive-home-s3
                key: access_key
          - name: RCLONE_CONFIG_ARCHIVE_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: ovhcloud-archive-home-s3
                key: secret_key
          - name: RCLONE_CONFIG_ARCHIVE_ENDPOINT
            valueFrom:
              secretKeyRef:
                name: ovhcloud-archive-home-s3
                key: endpoint
          - name: RCLONE_CONFIG_ARCHIVE_REGION
            valueFrom:
              secretKeyRef:
                name: ovhcloud-archive-home-s3
                key: region
          - name: ARCHIVE_BUCKET
            valueFrom:
              secretKeyRef:
                name: ovhcloud-archive-home-s3
                key: bucket
        args:
          - |
            set -eu
            bundle_dir="/scratch/sources/humble-bundle/$BUNDLE_NAME"
            if [ ! -d "$bundle_dir" ]; then
              echo "Bundle dir missing, nothing to archive"; exit 0
            fi
            dest="archive:$ARCHIVE_BUCKET/books/humble-bundle/$BUNDLE_NAME/"
            echo "[archive] $bundle_dir -> $dest"
            # --s3-no-check-bucket: skip HeadBucket/CreateBucket pre-check.
            # Our IAM policy lacks s3:CreateBucket (by design); without this
            # flag rclone hangs in silent retry. See reference_ovh_s3_lifecycle.
            rclone copy "$bundle_dir" "$dest" \
              --s3-no-check-bucket \
              --s3-storage-class=STANDARD_IA \
              --stats-one-line --stats=30s --transfers=4
            rclone check "$bundle_dir" "$dest" --one-way
            echo "archived bundle: $BUNDLE_NAME"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            memory: 512Mi
        volumeMounts:
          - name: scratch
            mountPath: /scratch
