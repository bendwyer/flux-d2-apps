---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: process-humble
  namespace: books
spec:
  serviceAccountName: argo-workflow
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  entrypoint: main
  # Gates scratch-PVC delete on workflow success. See `cleanup` template.
  onExit: cleanup
  # TTL governs the Workflow resource only. Scratch PVC lifecycle is
  # handled by `onExit` on success + cleanup cron for orphans.
  ttlStrategy:
    secondsAfterSuccess: 900
    secondsAfterFailure: 14400
    secondsAfterCompletion: 86400
  # Failure recovery: fix root cause → `kubectl delete workflow` →
  # resubmit with same bundle_key. Scratch persists, done-markers skip
  # completed work. Do NOT `argo retry` for template fixes —
  # status.storedWorkflowTemplateSpec is snapshotted at submit time.
  synchronization:
    # Global cap across humble+kobo.
    semaphores:
      - configMapKeyRef:
          name: books-workflow-semaphore
          key: processing
    # Same-bundle serialization (makes RWO-mount contention explicit).
    mutexes:
      - name: "humble-bundle-{{workflow.parameters.bundle_key}}"
  arguments:
    parameters:
      - name: bundle_key
        description: Humble bundle URL key (from `humble-cli list` KEY column).
      - name: formats
        description: |
          Pipe-separated humble-cli format names to download. Defines the
          candidate pool humble-sorter picks from (largest wins). Default
          covers all formats we can process; override to constrain (e.g.
          "cbz" to skip PDF bandwidth when the sorter should always pick
          CBZ). Pipe separator because names like "pdf (hq)" contain spaces.
        value: "pdf|pdf (hq)|cbz|epub|epub (hq)"
  # bundle_name and scratch_size are derived at runtime by `resolve`.
  # scratch_size = bundle total × 3 rounded to GiB, min 4Gi (covers source +
  # converted output co-resident during kcc).
  # PVC built via resource template, not volumeClaimTemplates — the latter
  # can't substitute parameters into the storage quantity.
  volumes:
    - name: library
      persistentVolumeClaim:
        claimName: library-shared-pvc
    - name: tmp
      emptyDir: {}
    - name: config
      emptyDir: {}
    - name: humble-secret
      secret:
        secretName: humble-credentials
    - name: comicvine-secret
      secret:
        secretName: comicvine-credentials
    - name: kavita-secret
      secret:
        secretName: kavita-agent-api-key
    - name: anthropic-secret
      secret:
        secretName: anthropic-agent-api-key
  templates:
    - name: main
      inputs:
        parameters:
          - name: bundle_key
          - name: formats
      dag:
        tasks:
          - name: resolve
            template: resolve
            arguments:
              parameters:
                - name: bundle_key
                  value: "{{inputs.parameters.bundle_key}}"
          - name: ensure-scratch-pvc
            dependencies: [resolve]
            template: ensure-scratch-pvc
            arguments:
              parameters:
                - name: bundle_key
                  value: "{{inputs.parameters.bundle_key}}"
                - name: scratch_size
                  value: "{{tasks.resolve.outputs.parameters.scratch_size}}"
          - name: sync
            dependencies: [ensure-scratch-pvc]
            template: sync
            arguments:
              parameters:
                - name: bundle_key
                  value: "{{inputs.parameters.bundle_key}}"
                - name: formats
                  value: "{{inputs.parameters.formats}}"
                - name: pvc_name
                  value: "{{tasks.ensure-scratch-pvc.outputs.parameters.pvc_name}}"
          - name: classify-items
            dependencies: [sync]
            template: classify-items
            arguments:
              parameters:
                - name: bundle_name
                  value: "{{tasks.sync.outputs.parameters.bundle_name}}"
                - name: bundle_title
                  value: "{{tasks.resolve.outputs.parameters.bundle_title}}"
                - name: pvc_name
                  value: "{{tasks.ensure-scratch-pvc.outputs.parameters.pvc_name}}"
          - name: convert-manga
            dependencies: [classify-items]
            template: convert-manga
            arguments:
              parameters:
                - name: bundle_name
                  value: "{{tasks.sync.outputs.parameters.bundle_name}}"
                - name: pvc_name
                  value: "{{tasks.ensure-scratch-pvc.outputs.parameters.pvc_name}}"
          - name: convert-comics
            dependencies: [classify-items]
            template: convert-comics
            arguments:
              parameters:
                - name: bundle_name
                  value: "{{tasks.sync.outputs.parameters.bundle_name}}"
                - name: pvc_name
                  value: "{{tasks.ensure-scratch-pvc.outputs.parameters.pvc_name}}"
          - name: metadata-manga
            dependencies: [convert-manga]
            template: metadata-manga
            arguments:
              parameters:
                - name: bundle_key
                  value: "{{workflow.parameters.bundle_key}}"
                - name: bundle_title
                  value: "{{tasks.resolve.outputs.parameters.bundle_title}}"
                - name: pvc_name
                  value: "{{tasks.ensure-scratch-pvc.outputs.parameters.pvc_name}}"
          - name: metadata-comics
            dependencies: [convert-comics]
            template: metadata-comics
            arguments:
              parameters:
                - name: bundle_key
                  value: "{{workflow.parameters.bundle_key}}"
                - name: bundle_title
                  value: "{{tasks.resolve.outputs.parameters.bundle_title}}"
                - name: pvc_name
                  value: "{{tasks.ensure-scratch-pvc.outputs.parameters.pvc_name}}"
          - name: metadata-ebook
            dependencies: [classify-items]
            template: metadata-ebook
            arguments:
              parameters:
                - name: bundle_name
                  value: "{{tasks.sync.outputs.parameters.bundle_name}}"
                - name: pvc_name
                  value: "{{tasks.ensure-scratch-pvc.outputs.parameters.pvc_name}}"
          - name: archive
            dependencies: [metadata-manga, metadata-comics, metadata-ebook]
            template: archive
            arguments:
              parameters:
                - name: bundle_name
                  value: "{{tasks.sync.outputs.parameters.bundle_name}}"
                - name: pvc_name
                  value: "{{tasks.ensure-scratch-pvc.outputs.parameters.pvc_name}}"

    # resolve: fetch bundle details and emit bundle_title + scratch_size.
    # bundle_title drives classify-items (the lane classifier); scratch_size
    # is the requested PVC size (bundle total × 3, min 4Gi). No scratch
    # mounted yet — runs on /tmp only.
    - name: resolve
      inputs:
        parameters:
          - name: bundle_key
      container:
        image: ghcr.io/bendwyer/containers/humble-cli:0.23@sha256:eb51691fdee715da0c93b7bb543c25a3b76246c8482fe7f5d1582f9492f5cdad
        command: ["sh", "-c"]
        args:
          - |
            set -eu
            umask 022
            export HOME=/tmp
            humble-cli auth "$(cat /secret/credential)"
            humble-cli details "{{inputs.parameters.bundle_key}}" > /tmp/details.txt

            # First line starting with "Humble ... Bundle" is the full title,
            # which is what the classifier expects.
            title=$(grep -m1 -E '^Humble .*Bundle' /tmp/details.txt || true)
            if [ -z "$title" ]; then
              echo "ERROR: could not extract bundle title from details"
              head -10 /tmp/details.txt
              exit 1
            fi

            # "Total size   : X GiB" — strip everything up to and including the colon.
            size_line=$(grep -m1 -E '^Total size' /tmp/details.txt || true)
            if [ -z "$size_line" ]; then
              echo "ERROR: could not extract total size"; exit 1
            fi
            size=$(printf '%s' "$size_line" | sed -E 's/.*:[[:space:]]*//')

            # Convert size (e.g. "45.9 GiB" / "112.1 MiB") to scratch GiB.
            # 3x multiplier covers source + converted output co-resident
            # on scratch during kcc. Chosen after Massive-Verse (8.3 GiB)
            # exhausted a prior 1.5x allocation mid-conversion. Floor 4Gi.
            unit=$(printf '%s' "$size" | awk '{print $2}')
            value=$(printf '%s' "$size" | awk '{print $1}')
            case "$unit" in
              MiB|MB) mib=$(awk -v v="$value" 'BEGIN{printf "%.0f", v}') ;;
              GiB|GB) mib=$(awk -v v="$value" 'BEGIN{printf "%.0f", v*1024}') ;;
              TiB|TB) mib=$(awk -v v="$value" 'BEGIN{printf "%.0f", v*1024*1024}') ;;
              *)      echo "ERROR: unknown size unit: $unit"; exit 1 ;;
            esac
            scratch_gi=$(awk -v m="$mib" 'BEGIN{
              need_mib = m * 3
              g = int((need_mib + 1023) / 1024)
              if (g < 4) g = 4
              print g
            }')

            echo "resolved:"
            echo "  bundle_title: $title"
            echo "  bundle_size: $size"
            echo "  scratch_size: ${scratch_gi}Gi"

            printf '%s' "${scratch_gi}Gi" > /tmp/scratch_size.txt
            printf '%s' "$title" > /tmp/bundle_title.txt
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 256Mi
        volumeMounts:
          - name: humble-secret
            mountPath: /secret
            readOnly: true
          - name: tmp
            mountPath: /tmp
      outputs:
        parameters:
          - name: scratch_size
            valueFrom:
              path: /tmp/scratch_size.txt
          - name: bundle_title
            valueFrom:
              path: /tmp/bundle_title.txt

    # Idempotent create-or-noop via SSA. Deterministic name lets a resubmit
    # reuse the PVC across workflow invocations. No ownerReference —
    # lifecycle handled by onExit (success) + cleanup cron (orphans).
    # SSA will fail on size change (immutable field); bundle sizes are
    # stable in practice.
    - name: ensure-scratch-pvc
      inputs:
        parameters:
          - name: bundle_key
          - name: scratch_size
      resource:
        action: apply
        setOwnerReference: false
        # Name lowercased for RFC 1123. Label keeps original casing so
        # cleanup-cron's label filter still matches.
        manifest: |
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: humble-bundle-{{=sprig.lower(inputs.parameters.bundle_key)}}
            namespace: books
            labels:
              app.kubernetes.io/name: process-humble
              app.kubernetes.io/managed-by: argo-workflows
              books.bendwyer.net/bundle-key: "{{inputs.parameters.bundle_key}}"
          spec:
            accessModes: [ReadWriteOnce]
            storageClassName: longhorn-scratch
            resources:
              requests:
                storage: "{{inputs.parameters.scratch_size}}"
      outputs:
        parameters:
          - name: pvc_name
            valueFrom:
              jsonPath: '{.metadata.name}'

    - name: sync
      inputs:
        parameters:
          - name: bundle_key
          - name: formats
          - name: pvc_name
      volumes:
        - name: scratch
          persistentVolumeClaim:
            claimName: "{{inputs.parameters.pvc_name}}"
      container:
        image: ghcr.io/bendwyer/containers/humble-cli:0.23@sha256:eb51691fdee715da0c93b7bb543c25a3b76246c8482fe7f5d1582f9492f5cdad
        command: ["sh", "-c"]
        args:
          - |
            set -eu
            umask 022
            export HOME=/tmp
            humble-cli auth "$(cat /secret/credential)"
            mkdir -p /scratch/sources/humble-bundle
            cd /scratch/sources/humble-bundle
            echo "{{inputs.parameters.bundle_key}}" > /tmp/bundles.txt

            # Parse pipe-separated `formats` into multiple --format flags.
            # Pipe separator because format names ("pdf (hq)") contain
            # spaces. Assign Argo's substitution to a single-quoted variable
            # first — if we used `set -- {{inputs.parameters.formats}}`
            # directly, the shell would parse "(hq)" as subshell syntax at
            # parse time, before any variable expansion. Via a variable,
            # parens are literal chars in the expanded value. `set -f`
            # disables globbing just in case.
            formats_raw='{{inputs.parameters.formats}}'
            set -f
            IFS='|'
            set -- $formats_raw
            unset IFS
            set +f
            cmd="humble-cli bulk-download /tmp/bundles.txt"
            for fmt in "$@"; do
              esc=$(printf '%s' "$fmt" | sed "s/'/'\\\\''/g")
              cmd="$cmd --format '$esc'"
            done
            echo "running: $cmd"
            eval "$cmd"

            # Detect the actual bundle directory humble-cli created.
            # humble-cli sanitizes some characters (e.g. ":" becomes "  ") so
            # the list-output name is not always the filesystem slug. Read
            # the real slug from /scratch and emit it as an output param so
            # downstream tasks work against the correct path.
            dirs=$(find /scratch/sources/humble-bundle -mindepth 1 -maxdepth 1 -type d | wc -l)
            if [ "$dirs" -eq 0 ]; then
              echo "ERROR: bulk-download completed but created no directory"
              exit 1
            fi
            if [ "$dirs" -gt 1 ]; then
              echo "ERROR: bulk-download created $dirs directories — expected exactly 1"
              find /scratch/sources/humble-bundle -mindepth 1 -maxdepth 1 -type d
              exit 1
            fi
            bundle_dir=$(find /scratch/sources/humble-bundle -mindepth 1 -maxdepth 1 -type d)
            bundle_name=$(basename "$bundle_dir")
            echo "detected bundle_name: $bundle_name"
            printf '%s' "$bundle_name" > /tmp/bundle_name.txt
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi
        volumeMounts:
          - name: humble-secret
            mountPath: /secret
            readOnly: true
          - name: tmp
            mountPath: /tmp
          - name: scratch
            mountPath: /scratch
      outputs:
        parameters:
          - name: bundle_name
            valueFrom:
              path: /tmp/bundle_name.txt

    # Writes lane manifests to /scratch/classified/{comics,manga,ebook}.txt.
    # Downstream convert-* and metadata-ebook steps filter by their lane's
    # manifest; empty manifests are no-ops. See containers/images/humble-sorter.
    - name: classify-items
      inputs:
        parameters:
          - name: bundle_name
          - name: bundle_title
          - name: pvc_name
      volumes:
        - name: scratch
          persistentVolumeClaim:
            claimName: "{{inputs.parameters.pvc_name}}"
      container:
        image: ghcr.io/bendwyer/containers/humble-sorter:1.0.0@sha256:c64ff3243633e31f551742c2b04d71e1cdc02a7694920e5e7ff13ff67ce8a282
        command: ["python", "-B", "/app/humble_sorter.py"]
        args:
          - --bundle-dir
          - "/scratch/sources/humble-bundle/{{inputs.parameters.bundle_name}}"
          - --bundle-title
          - "{{inputs.parameters.bundle_title}}"
          - --output-dir
          - /scratch/classified
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 128Mi
        volumeMounts:
          - name: scratch
            mountPath: /scratch
          - name: tmp
            mountPath: /tmp

    # Templates mounting the RWO scratch PVC share `scratch-pvc` mutex so
    # parallel siblings don't deadlock racing for the volume on different nodes.
    - name: convert-manga
      synchronization:
        mutexes:
          - name: scratch-pvc
      inputs:
        parameters:
          - name: bundle_name
          - name: pvc_name
      volumes:
        - name: scratch
          persistentVolumeClaim:
            claimName: "{{inputs.parameters.pvc_name}}"
      container:
        image: ghcr.io/ciromattia/kcc:v10.1.0@sha256:8cba211079cc7267479be35654fdcc723006b0377449b08671a916afe1ecaad1
        command: ["sh", "-c"]
        env:
          - name: BUNDLE_NAME
            value: "{{inputs.parameters.bundle_name}}"
        args:
          - |
            umask 022
            MANIFEST=/scratch/classified/manga.txt
            if [ ! -s "$MANIFEST" ]; then
              echo "No manga items in this bundle"; exit 0
            fi
            mkdir -p /scratch/incoming/manga
            BUNDLE_DIR="/scratch/sources/humble-bundle/$BUNDLE_NAME"
            TAB=$(printf '\t')
            while IFS="$TAB" read -r rel fmt; do
              [ -z "$rel" ] && continue
              src="$BUNDLE_DIR/$rel"
              parent_name=$(basename "$(dirname "$src")")
              output_name=$(printf '%s' "$parent_name" | sed -E '
                s/  +.*$//
                s/ (Volume|Vol) ?\.? ?([0-9]+)$/ \2/
              ')
              if ! echo "$output_name" | grep -qE ' [0-9]+$'; then
                output_name="${output_name} 1"
              fi
              # Resubmit idempotency: see convert-comics.
              if [ -f "/scratch/incoming/manga/${output_name}.cbz" ] || \
                 [ -f "/scratch/incoming/manga/${output_name}.cbz.done" ]; then
                echo "Skipping (already processed): ${output_name}.cbz"
                continue
              fi
              if [ "$fmt" = "cbz" ]; then
                echo "Copying (already CBZ): $src -> ${output_name}.cbz"
                cp "$src" "/scratch/incoming/manga/${output_name}.cbz"
              else
                echo "Converting ($fmt): $src -> ${output_name}.cbz"
                src_basename=$(basename "$src")
                src_stem="${src_basename%.*}"
                c2e -n -f CBZ -o /scratch/incoming/manga "$src" && \
                mv "/scratch/incoming/manga/${src_stem}.cbz" "/scratch/incoming/manga/${output_name}.cbz"
              fi
            done < "$MANIFEST"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 100m
            memory: 4Gi
          limits:
            memory: 4Gi
        volumeMounts:
          - name: tmp
            mountPath: /tmp
          - name: scratch
            mountPath: /scratch

    - name: convert-comics
      synchronization:
        mutexes:
          - name: scratch-pvc
      inputs:
        parameters:
          - name: bundle_name
          - name: pvc_name
      volumes:
        - name: scratch
          persistentVolumeClaim:
            claimName: "{{inputs.parameters.pvc_name}}"
      container:
        image: ghcr.io/ciromattia/kcc:v10.1.0@sha256:8cba211079cc7267479be35654fdcc723006b0377449b08671a916afe1ecaad1
        command: ["sh", "-c"]
        env:
          - name: BUNDLE_NAME
            value: "{{inputs.parameters.bundle_name}}"
        args:
          - |
            umask 022
            MANIFEST=/scratch/classified/comics.txt
            if [ ! -s "$MANIFEST" ]; then
              echo "No comics items in this bundle"; exit 0
            fi
            mkdir -p /scratch/incoming/comics
            BUNDLE_DIR="/scratch/sources/humble-bundle/$BUNDLE_NAME"
            # Manifest lines: "<relative_path>\t<format>". Format is one
            # of {pdf,cbz,epub,mobi}; cbz short-circuits kcc.
            TAB=$(printf '\t')
            while IFS="$TAB" read -r rel fmt; do
              [ -z "$rel" ] && continue
              src="$BUNDLE_DIR/$rel"
              parent_name=$(basename "$(dirname "$src")")
              if echo "$parent_name" | grep -qE ' (Vol|Volume) ?\.? ?[0-9]+  '; then
                output_name=$(printf '%s' "$parent_name" | sed -E '
                  s/  +.*$//
                  s/ (Volume|Vol) ?\.? ?([0-9]+)$/ \2/
                ')
              else
                output_name=$(printf '%s' "$parent_name" | sed -E '
                  s/  +/ /g
                  s/ #0*([0-9]+).*$/ \1/
                  s/ (Volume|Vol) ?\.? ?([0-9]+)$/ \2/
                ')
              fi
              if ! echo "$output_name" | grep -qE ' [0-9]+$'; then
                output_name="${output_name} 1"
              fi
              # Resubmit idempotency: .cbz = still-on-scratch,
              # .cbz.done = already handled by metadata (library or _unmatched).
              if [ -f "/scratch/incoming/comics/${output_name}.cbz" ] || \
                 [ -f "/scratch/incoming/comics/${output_name}.cbz.done" ]; then
                echo "Skipping (already processed): ${output_name}.cbz"
                continue
              fi
              if [ "$fmt" = "cbz" ]; then
                echo "Copying (already CBZ): $src -> ${output_name}.cbz"
                cp "$src" "/scratch/incoming/comics/${output_name}.cbz"
              else
                echo "Converting ($fmt): $src -> ${output_name}.cbz"
                src_basename=$(basename "$src")
                src_stem="${src_basename%.*}"
                c2e -n -f CBZ -o /scratch/incoming/comics "$src" && \
                mv "/scratch/incoming/comics/${src_stem}.cbz" "/scratch/incoming/comics/${output_name}.cbz"
              fi
            done < "$MANIFEST"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 100m
            memory: 4Gi
          limits:
            memory: 4Gi
        volumeMounts:
          - name: tmp
            mountPath: /tmp
          - name: scratch
            mountPath: /scratch

    # Manga lane: same agent + apply pattern as metadata-comics, just with
    # --lane manga so the planner uses manga filename/folder conventions.
    # Agent uses ComicVine for matching (CV has Western-published manga
    # — Dark Horse imprints, Yen Press, VIZ etc.). MangaBaka is not used by
    # the agent today; if a manga item isn't on CV it dead-letters and
    # gets manual triage. MangaBaka extension is a future enhancement.
    - name: metadata-manga
      synchronization:
        mutexes:
          - name: scratch-pvc
      inputs:
        parameters:
          - name: bundle_key
          - name: bundle_title
          - name: pvc_name
      volumes:
        - name: scratch
          persistentVolumeClaim:
            claimName: "{{inputs.parameters.pvc_name}}"
      container:
        image: ghcr.io/bendwyer/containers/comics-metadata-agent:0.3.16@sha256:d51ae424a9aa25393635e3b3ae053be5c935da2f14d8214e395c5b1263ac11de
        command: ["sh", "-c"]
        env:
          - name: HOME
            value: /tmp
        args:
          - |
            set -e
            umask 022
            ls /scratch/incoming/manga/*.cbz >/dev/null 2>&1 || { echo "No .cbz files to process"; exit 0; }

            cat > /tmp/source.json <<'EOF'
            {
              "source_id": "{{inputs.parameters.bundle_key}}",
              "source_title": "{{inputs.parameters.bundle_title}}"
            }
            EOF

            python -B /app/agent.py \
              --staging-dir /scratch/incoming/manga \
              --lane manga \
              --source-context /tmp/source.json \
              --decision-log-dir /books/library/.agent-decisions/manga \
              --kavita-url http://kavita.books.svc.cluster.local:5000 \
              --kavita-api-key-file /secret/kavita/credential \
              --comicvine-api-key-file /secret/comicvine/credential \
              --anthropic-credential-file /secret/anthropic/credential \
              --model claude-sonnet-4-6

            python -B /app/apply.py \
              --source-id "{{inputs.parameters.bundle_key}}" \
              --lane manga \
              --staging-dir /scratch/incoming/manga \
              --decision-log-dir /books/library/.agent-decisions/manga \
              --kavita-url http://kavita.books.svc.cluster.local:5000 \
              --kavita-api-key-file /secret/kavita/credential \
              --comicvine-api-key-file /secret/comicvine/credential

            if ls /scratch/incoming/manga/*.cbz >/dev/null 2>&1; then
              mkdir -p /books/incoming/manga/_unmatched
              for f in /scratch/incoming/manga/*.cbz; do
                base=$(basename "$f")
                if mv "$f" "/books/incoming/manga/_unmatched/$base"; then
                  echo "Dead-lettered (agent uncertain or skipped): $base"
                else
                  echo "Warning: failed to move to _unmatched: $f" >&2
                fi
              done
            fi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 200m
            memory: 4Gi
          limits:
            memory: 4Gi
        volumeMounts:
          - name: scratch
            mountPath: /scratch
          - name: library
            mountPath: /books
          - name: kavita-secret
            mountPath: /secret/kavita
            readOnly: true
          - name: comicvine-secret
            mountPath: /secret/comicvine
            readOnly: true
          - name: anthropic-secret
            mountPath: /secret/anthropic
            readOnly: true
          - name: tmp
            mountPath: /tmp

    # Agent-decides + bundle-aware apply. The agent matches every item
    # against ComicVine using bundle source coherence, sibling consistency,
    # and Kavita library precedent. apply.py runs the bundle planner over
    # the agent's decisions and writes canonical metadata via comictagger
    # --id, then moves files into the comics library. Items the agent flags
    # uncertain (or anything left in scratch after apply) dead-letter to
    # /books/incoming/comics/_unmatched for review.
    - name: metadata-comics
      synchronization:
        mutexes:
          - name: scratch-pvc
      inputs:
        parameters:
          - name: bundle_key
          - name: bundle_title
          - name: pvc_name
      volumes:
        - name: scratch
          persistentVolumeClaim:
            claimName: "{{inputs.parameters.pvc_name}}"
      container:
        image: ghcr.io/bendwyer/containers/comics-metadata-agent:0.3.16@sha256:d51ae424a9aa25393635e3b3ae053be5c935da2f14d8214e395c5b1263ac11de
        command: ["sh", "-c"]
        env:
          - name: HOME
            value: /tmp
        args:
          - |
            set -e
            umask 022
            ls /scratch/incoming/comics/*.cbz >/dev/null 2>&1 || { echo "No .cbz files to process"; exit 0; }

            cat > /tmp/source.json <<'EOF'
            {
              "source_id": "{{inputs.parameters.bundle_key}}",
              "source_title": "{{inputs.parameters.bundle_title}}"
            }
            EOF

            python -B /app/agent.py \
              --staging-dir /scratch/incoming/comics \
              --lane comics \
              --source-context /tmp/source.json \
              --decision-log-dir /books/library/.agent-decisions/comics \
              --kavita-url http://kavita.books.svc.cluster.local:5000 \
              --kavita-api-key-file /secret/kavita/credential \
              --comicvine-api-key-file /secret/comicvine/credential \
              --anthropic-credential-file /secret/anthropic/credential \
              --model claude-sonnet-4-6

            python -B /app/apply.py \
              --source-id "{{inputs.parameters.bundle_key}}" \
              --lane comics \
              --staging-dir /scratch/incoming/comics \
              --decision-log-dir /books/library/.agent-decisions/comics \
              --kavita-url http://kavita.books.svc.cluster.local:5000 \
              --kavita-api-key-file /secret/kavita/credential \
              --comicvine-api-key-file /secret/comicvine/credential

            # Sweep leftovers (uncertain decisions, low-confidence skips) to
            # the dead-letter queue so scratch is empty and the workflow's
            # cleanup step can drop the PVC cleanly.
            if ls /scratch/incoming/comics/*.cbz >/dev/null 2>&1; then
              mkdir -p /books/incoming/comics/_unmatched
              for f in /scratch/incoming/comics/*.cbz; do
                base=$(basename "$f")
                if mv "$f" "/books/incoming/comics/_unmatched/$base"; then
                  echo "Dead-lettered (agent uncertain or skipped): $base"
                else
                  echo "Warning: failed to move to _unmatched: $f" >&2
                fi
              done
            fi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 200m
            memory: 4Gi
          limits:
            memory: 4Gi
        volumeMounts:
          - name: scratch
            mountPath: /scratch
          - name: library
            mountPath: /books
          - name: kavita-secret
            mountPath: /secret/kavita
            readOnly: true
          - name: comicvine-secret
            mountPath: /secret/comicvine
            readOnly: true
          - name: anthropic-secret
            mountPath: /secret/anthropic
            readOnly: true
          - name: tmp
            mountPath: /tmp

    # Edge-case lane for rare `Humble Book Bundle` prose-only bundles.
    # Most humble bundles classify all-items to comics/manga; this is a
    # no-op in those cases.
    # Known limitation: ebook-metadata has no per-file filter; it processes
    # every PDF in the input dir. Safe only if the bundle is all-ebook
    # (which the classifier enforces via the Humble-Book-Bundle prefix check
    # plus the 50 MiB size veto). A hypothetical mixed-ebook-and-comics
    # bundle would mis-process — revisit if one ever appears.
    - name: metadata-ebook
      synchronization:
        mutexes:
          - name: scratch-pvc
      inputs:
        parameters:
          - name: bundle_name
          - name: pvc_name
      volumes:
        - name: scratch
          persistentVolumeClaim:
            claimName: "{{inputs.parameters.pvc_name}}"
      container:
        image: ghcr.io/bendwyer/containers/ebook-metadata:2.0.2@sha256:358418ecd2e1c0e56da14b72acab35abff9c8720c0c0b24d770a9c0261cac8b6
        command: ["sh", "-c"]
        env:
          - name: BUNDLE_NAME
            value: "{{inputs.parameters.bundle_name}}"
        args:
          - |
            if [ ! -s /scratch/classified/ebook.txt ]; then
              echo "No ebook items in this bundle"; exit 0
            fi
            exec python3 /app/ebook_metadata.py \
              --input-dir "/scratch/sources/humble-bundle/$BUNDLE_NAME" \
              --output-dir /books/library/ebooks \
              --marker-dir /scratch/markers/humble-ebook \
              --provider goodreads
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi
        volumeMounts:
          - name: scratch
            mountPath: /scratch
          - name: library
            mountPath: /books
          - name: tmp
            mountPath: /tmp

    - name: archive
      inputs:
        parameters:
          - name: bundle_name
          - name: pvc_name
      volumes:
        - name: scratch
          persistentVolumeClaim:
            claimName: "{{inputs.parameters.pvc_name}}"
      container:
        image: rclone/rclone:1.74@sha256:d2e0e88359d0b2e67cfcd2c43d5405185eb8adfc207079df27c42da82c5207bc
        command: ["sh", "-c"]
        env:
          - name: BUNDLE_NAME
            value: "{{inputs.parameters.bundle_name}}"
          - name: RCLONE_CONFIG_ARCHIVE_TYPE
            value: "s3"
          - name: RCLONE_CONFIG_ARCHIVE_PROVIDER
            value: "Other"
          - name: RCLONE_CONFIG_ARCHIVE_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: ovhcloud-archive-home-s3
                key: access_key
          - name: RCLONE_CONFIG_ARCHIVE_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: ovhcloud-archive-home-s3
                key: secret_key
          - name: RCLONE_CONFIG_ARCHIVE_ENDPOINT
            valueFrom:
              secretKeyRef:
                name: ovhcloud-archive-home-s3
                key: endpoint
          - name: RCLONE_CONFIG_ARCHIVE_REGION
            valueFrom:
              secretKeyRef:
                name: ovhcloud-archive-home-s3
                key: region
          - name: ARCHIVE_BUCKET
            valueFrom:
              secretKeyRef:
                name: ovhcloud-archive-home-s3
                key: bucket
        args:
          - |
            set -eu
            bundle_dir="/scratch/sources/humble-bundle/$BUNDLE_NAME"
            if [ ! -d "$bundle_dir" ]; then
              echo "Bundle dir missing, nothing to archive"; exit 0
            fi
            dest="archive:$ARCHIVE_BUCKET/books/humble-bundle/$BUNDLE_NAME/"
            echo "[archive] $bundle_dir -> $dest"
            # --s3-no-check-bucket: skip HeadBucket/CreateBucket pre-check.
            # Our IAM policy lacks s3:CreateBucket (by design); without this
            # flag rclone hangs in silent retry. See reference_ovh_s3_lifecycle.
            # --stats-one-line uses CR to rewrite in-place; K8s log capture is
            # LF-buffered so mid-transfer stats never appear. Multi-line stats
            # (without the flag) flush cleanly every --stats interval.
            rclone copy "$bundle_dir" "$dest" \
              --s3-no-check-bucket \
              --s3-storage-class=STANDARD_IA \
              --stats=30s --transfers=4
            rclone check "$bundle_dir" "$dest" --one-way
            echo "archived bundle: $BUNDLE_NAME"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            memory: 512Mi
        volumeMounts:
          - name: scratch
            mountPath: /scratch

    # onExit handler. Deletes scratch PVC only on workflow success;
    # failures leave it for resubmit.
    - name: cleanup
      dag:
        tasks:
          - name: delete-pvc
            template: delete-scratch-pvc
            when: "{{workflow.status}} == Succeeded"

    - name: delete-scratch-pvc
      # --wait=false breaks the pvc-protection ↔ podGC=OnWorkflowSuccess deadlock;
      # the finalizer clears after podGC reaps the workflow pods post-success.
      resource:
        action: delete
        flags: ["--wait=false"]
        manifest: |
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: humble-bundle-{{=sprig.lower(workflow.parameters.bundle_key)}}
            namespace: books
