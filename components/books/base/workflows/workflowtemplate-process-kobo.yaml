---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: process-kobo
  namespace: books
spec:
  serviceAccountName: argo-workflow
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  entrypoint: main
  synchronization:
    semaphores:
      - configMapKeyRef:
          name: books-workflow-semaphore
          key: processing
  volumeClaimTemplates:
    - metadata:
        name: scratch
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: longhorn-scratch
        resources:
          requests:
            storage: 10Gi
  volumes:
    - name: library
      persistentVolumeClaim:
        claimName: library-shared-pvc
    - name: tmp
      emptyDir: {}
    - name: config
      emptyDir: {}
    - name: kobo-secret
      secret:
        secretName: kobo-credentials
    - name: comicvine-secret
      secret:
        secretName: comicvine-credentials
  templates:
    - name: main
      dag:
        tasks:
          - name: sync
            template: sync
          - name: convert-manga
            template: convert-manga
            dependencies: [sync]
          - name: metadata-ebook
            template: metadata-ebook
            dependencies: [sync]
          - name: metadata-manga
            template: metadata-manga
            dependencies: [convert-manga]
          - name: archive
            template: archive
            dependencies: [metadata-ebook, metadata-manga]
          - name: mark-processed
            template: mark-processed
            dependencies: [archive]

    - name: sync
      container:
        image: ghcr.io/subdavis/kobodl:0.13.0@sha256:2a2ce51556e7886250ecb48ee14f793169a39b7717dc132cb08c444977d03800
        command: ["sh", "-c"]
        args:
          - |
            set -eu
            umask 022
            cp /secret/kobodl.json /tmp/kobodl.json
            mkdir -p /scratch/sources/kobo /books/markers/processed/kobo

            # Build diff: purchased books minus those already processed.
            #
            # kobodl book list prints space-formatted columns. The only book
            # identifier in the output is the full UUID RevisionId
            # (8-4-4-4-12 hex with hyphens). The 8-char "ShortRevisionId"
            # used in filenames and markers is a kobodl --format-str output
            # convention, not a queryable field. We extract full UUIDs from
            # the list, derive the short form via parameter expansion, and
            # use the short form for marker lookup. Download command is fed
            # full UUIDs (book get accepts them).
            kobodl --config /tmp/kobodl.json book list > /tmp/all.txt
            TO_GET=""
            for full_id in $(awk '{
                for (i = 1; i <= NF; i++) {
                  if ($i ~ /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/)
                    print $i
                }
              }' /tmp/all.txt | sort -u); do
              short_id="${full_id%%-*}"
              [ -f "/books/markers/processed/kobo/${short_id}.done" ] && continue
              TO_GET="$TO_GET $full_id"
            done

            if [ -z "$TO_GET" ]; then
              echo "No new books to download."
              exit 0
            fi
            echo "Downloading:$TO_GET"
            kobodl --config /tmp/kobodl.json book get $TO_GET \
              --output-dir /scratch/sources/kobo \
              --format-str '{Title} - {Author} ({ShortRevisionId})'
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi
        volumeMounts:
          - name: kobo-secret
            mountPath: /secret
            readOnly: true
          - name: tmp
            mountPath: /tmp
          - name: scratch
            mountPath: /scratch
          - name: library
            mountPath: /books

    - name: convert-manga
      container:
        image: ghcr.io/bendwyer/containers/epub2cbz:2.1@sha256:12ab217483477daddd0f102ed40683b4dfe701936b2e383518a0080cf4b8dbfe
        command: ["python3", "/app/epub2cbz.py"]
        args:
          - --input-dir
          - /scratch/sources/kobo
          - --output-dir
          - /scratch/incoming/manga
          - --min-size
          - "50"
          - --marker-dir
          - /books/markers/manga
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi
        volumeMounts:
          - name: scratch
            mountPath: /scratch
          - name: library
            mountPath: /books

    - name: metadata-ebook
      container:
        image: ghcr.io/bendwyer/containers/ebook-metadata:2.0.1
        args:
          - --input-dir
          - /scratch/sources/kobo
          - --output-dir
          - /books/library/ebooks
          - --marker-dir
          - /books/markers/kobo
          - --provider
          - kobo
          - --country
          - de
          - --language
          - en
          - --skip-large
          - "50"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi
        volumeMounts:
          - name: scratch
            mountPath: /scratch
          - name: library
            mountPath: /books
          - name: tmp
            mountPath: /tmp

    - name: metadata-manga
      container:
        image: ghcr.io/bendwyer/containers/comictagger:1.6@sha256:b95350b251921a224e59b7ffac9d0961f48d0142e66f8c058c386b3fdf162aa3
        command: ["sh", "-c"]
        args:
          - |
            umask 022
            ls /scratch/incoming/manga/*.cbz >/dev/null 2>&1 || { echo "No .cbz files to process"; exit 0; }
            for f in /scratch/incoming/manga/*.cbz; do
              echo "Processing: $f"
              if comictagger \
                --no-gui \
                -s -o -f \
                --tags-write cr \
                --source mangabaka \
                --mangabaka-age-filter pornographic \
                --config /config \
                "$f"; then
                comictagger \
                  --no-gui \
                  -r --tags-read cr --move \
                  --dir /books/library/manga \
                  --template "{series}/{series} #{issue} ({year})" \
                  --config /config \
                  "$f" || echo "Warning: Tagged but failed to rename: $f"
              else
                echo "MangaBaka miss, trying ComicVine fallback: $f"
                if comictagger \
                  --no-gui \
                  -s -o -f \
                  --tags-write cr \
                  --source comicvine \
                  --comicvine-key "$(cat /secret/credential)" \
                  --config /config \
                  "$f"; then
                  comictagger \
                    --no-gui \
                    -r --tags-read cr --move \
                    --dir /books/library/manga \
                    --template "{series}/{series} #{issue} ({year})" \
                    --config /config \
                    "$f" || echo "Warning: Tagged but failed to rename: $f"
                else
                  echo "Dead-letter (no match in either source): $f"
                  mkdir -p /books/incoming/manga/_unmatched
                  mv "$f" /books/incoming/manga/_unmatched/ || echo "Warning: failed to move to _unmatched: $f"
                fi
              fi
            done
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi
        volumeMounts:
          - name: comicvine-secret
            mountPath: /secret
            readOnly: true
          - name: config
            mountPath: /config
          - name: tmp
            mountPath: /tmp
          - name: scratch
            mountPath: /scratch
          - name: library
            mountPath: /books

    - name: archive
      container:
        image: rclone/rclone:1.73.5
        command: ["sh", "-c"]
        args:
          - |
            set -eu
            ls /scratch/sources/kobo/*.epub >/dev/null 2>&1 || { echo "No source files to archive"; exit 0; }
            count=0
            for f in /scratch/sources/kobo/*.epub; do
              [ -f "$f" ] || continue
              base=$(basename "$f")
              echo "[archive] $base"
              # --s3-no-check-bucket: skip HeadBucket/CreateBucket pre-check.
              # Our IAM policy lacks s3:CreateBucket (by design); without this
              # flag rclone hangs in silent retry. See reference_ovh_s3_lifecycle.
              rclone copy "$f" "archive:$ARCHIVE_BUCKET/books/kobo/" \
                --s3-no-check-bucket \
                --s3-storage-class=STANDARD_IA \
                --stats-one-line --stats=30s
              rclone check "$f" "archive:$ARCHIVE_BUCKET/books/kobo/$base" --one-way
              count=$((count + 1))
            done
            echo "archived $count kobo source files"
        env:
          - name: RCLONE_CONFIG_ARCHIVE_TYPE
            value: "s3"
          - name: RCLONE_CONFIG_ARCHIVE_PROVIDER
            value: "Other"
          - name: RCLONE_CONFIG_ARCHIVE_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: ovhcloud-archive-home-s3
                key: access_key
          - name: RCLONE_CONFIG_ARCHIVE_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: ovhcloud-archive-home-s3
                key: secret_key
          - name: RCLONE_CONFIG_ARCHIVE_ENDPOINT
            valueFrom:
              secretKeyRef:
                name: ovhcloud-archive-home-s3
                key: endpoint
          - name: RCLONE_CONFIG_ARCHIVE_REGION
            valueFrom:
              secretKeyRef:
                name: ovhcloud-archive-home-s3
                key: region
          - name: ARCHIVE_BUCKET
            valueFrom:
              secretKeyRef:
                name: ovhcloud-archive-home-s3
                key: bucket
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi
        volumeMounts:
          - name: scratch
            mountPath: /scratch

    - name: mark-processed
      container:
        image: alpine:3.23.4
        command: ["sh", "-c"]
        args:
          - |
            set -u
            mkdir -p /books/markers/processed/kobo
            count=0
            for f in /scratch/sources/kobo/*.epub; do
              [ -f "$f" ] || continue
              base=$(basename "$f")
              id=$(echo "$base" | sed -E 's/.*\(([[:alnum:]]{7,16})\)\.epub$/\1/')
              [ -z "$id" ] && continue
              [ "$id" = "$base" ] && continue
              touch "/books/markers/processed/kobo/${id}.done"
              count=$((count + 1))
            done
            echo "marked $count kobo books as processed"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 64Mi
        volumeMounts:
          - name: scratch
            mountPath: /scratch
          - name: library
            mountPath: /books
