---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: process-kobo
  namespace: books
spec:
  serviceAccountName: argo-workflow
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  entrypoint: main
  # Tiered TTL: successful runs clean up fast; failed runs persist longer
  # for debugging. Scratch PVC (from volumeClaimTemplates) is lifecycle-tied
  # to the Workflow and cascades on Workflow GC.
  ttlStrategy:
    secondsAfterSuccess: 900       # 15 min on green run
    secondsAfterFailure: 14400     # 4 hrs for debugging
    secondsAfterCompletion: 86400  # catch-all, 24 hrs
  synchronization:
    semaphores:
      - configMapKeyRef:
          name: books-workflow-semaphore
          key: processing
  volumeClaimTemplates:
    - metadata:
        name: scratch
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: longhorn-scratch
        resources:
          requests:
            storage: 10Gi
  volumes:
    - name: library
      persistentVolumeClaim:
        claimName: library-shared-pvc
    - name: tmp
      emptyDir: {}
    - name: config
      emptyDir: {}
    - name: kobo-secret
      secret:
        secretName: kobo-credentials
    - name: comicvine-secret
      secret:
        secretName: comicvine-credentials
    - name: kavita-secret
      secret:
        secretName: kavita-agent-api-key
    - name: anthropic-secret
      secret:
        secretName: anthropic-agent-api-key
  templates:
    - name: main
      dag:
        tasks:
          - name: list-archive
            template: list-archive
          - name: sync
            template: sync
            dependencies: [list-archive]
          - name: convert-manga
            template: convert-manga
            dependencies: [sync]
          - name: metadata-ebook
            template: metadata-ebook
            dependencies: [sync]
          - name: metadata-manga
            template: metadata-manga
            dependencies: [convert-manga]
          - name: archive
            template: archive
            dependencies: [metadata-ebook, metadata-manga]

    # list-archive: enumerates the OVH S3 archive bucket and extracts the
    # ShortRevisionIds from the archived filenames. Passes the diff baseline
    # to `sync` via /scratch/archive_short_ids.txt. S3 is the canonical
    # "already processed" store — no marker files on the library PVC.
    #
    # Split into its own DAG task because the kobodl image doesn't have
    # rclone. One container per concern.
    - name: list-archive
      container:
        image: rclone/rclone:1.73.5
        command: ["sh", "-c"]
        args:
          - |
            set -eu
            mkdir -p /scratch
            # List object keys in the archive's kobo subpath.
            rclone lsf "archive:$ARCHIVE_BUCKET/books/kobo/" \
              --s3-no-check-bucket --files-only > /scratch/archive_basenames.txt
            # Extract ShortRevisionId from trailing "(xxxxxxxx).epub" group.
            sed -nE 's/.*\(([[:alnum:]]{7,16})\)\.[a-z]+$/\1/p' \
              /scratch/archive_basenames.txt | sort -u > /scratch/archive_short_ids.txt
            # Sanity check: bucket has files but regex extracted nothing =
            # filename convention changed upstream. Fail loud so sync doesn't
            # silently re-download the entire library.
            if [ ! -s /scratch/archive_short_ids.txt ] && [ -s /scratch/archive_basenames.txt ]; then
              echo "ERROR: archive bucket has $(wc -l < /scratch/archive_basenames.txt) files but zero short IDs extracted — regex broken?"
              head -5 /scratch/archive_basenames.txt
              exit 1
            fi
            echo "archived books in S3: $(wc -l < /scratch/archive_short_ids.txt)"
        env:
          - name: RCLONE_CONFIG_ARCHIVE_TYPE
            value: "s3"
          - name: RCLONE_CONFIG_ARCHIVE_PROVIDER
            value: "Other"
          - name: RCLONE_CONFIG_ARCHIVE_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: ovhcloud-archive-home-s3
                key: access_key
          - name: RCLONE_CONFIG_ARCHIVE_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: ovhcloud-archive-home-s3
                key: secret_key
          - name: RCLONE_CONFIG_ARCHIVE_ENDPOINT
            valueFrom:
              secretKeyRef:
                name: ovhcloud-archive-home-s3
                key: endpoint
          - name: RCLONE_CONFIG_ARCHIVE_REGION
            valueFrom:
              secretKeyRef:
                name: ovhcloud-archive-home-s3
                key: region
          - name: ARCHIVE_BUCKET
            valueFrom:
              secretKeyRef:
                name: ovhcloud-archive-home-s3
                key: bucket
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 128Mi
        volumeMounts:
          - name: scratch
            mountPath: /scratch
          - name: tmp
            mountPath: /tmp

    # sync: diff kobodl's purchased book list against the archive short-IDs
    # produced by list-archive. Download the unmatched UUIDs.
    #
    # kobodl book list prints space-formatted columns; the only book-level
    # identifier it exposes is the full UUID RevisionId (8-4-4-4-12 hex).
    # ShortRevisionId (first 8 chars) is a --format-str filename template
    # convention only. Derive short via ${full_id%%-*} for diff; pass full
    # UUID to `book get`.
    - name: sync
      container:
        image: ghcr.io/subdavis/kobodl:0.13.0@sha256:2a2ce51556e7886250ecb48ee14f793169a39b7717dc132cb08c444977d03800
        command: ["sh", "-c"]
        args:
          - |
            set -eu
            umask 022
            cp /secret/kobodl.json /tmp/kobodl.json
            mkdir -p /scratch/sources/kobo

            kobodl --config /tmp/kobodl.json book list > /tmp/all.txt
            TO_GET=""
            for full_id in $(awk '{
                for (i = 1; i <= NF; i++) {
                  if ($i ~ /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/)
                    print $i
                }
              }' /tmp/all.txt | sort -u); do
              short_id="${full_id%%-*}"
              grep -qx "$short_id" /scratch/archive_short_ids.txt && continue
              TO_GET="$TO_GET $full_id"
            done

            if [ -z "$TO_GET" ]; then
              echo "No new books to download."
              exit 0
            fi
            echo "Downloading:$TO_GET"
            kobodl --config /tmp/kobodl.json book get $TO_GET \
              --output-dir /scratch/sources/kobo \
              --format-str '{Title} - {Author} ({ShortRevisionId})'
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi
        volumeMounts:
          - name: kobo-secret
            mountPath: /secret
            readOnly: true
          - name: tmp
            mountPath: /tmp
          - name: scratch
            mountPath: /scratch

    # Templates mounting the RWO scratch PVC share `scratch-pvc` mutex so
    # parallel siblings don't deadlock racing for the volume on different nodes.
    - name: convert-manga
      synchronization:
        mutexes:
          - name: scratch-pvc
      container:
        image: ghcr.io/bendwyer/containers/epub2cbz:2.1@sha256:6a473e0fd6fdfc0d3d9637d4a28713fb0a8e589556b0a3c35e64507dae8edc6a
        command: ["python3", "/app/epub2cbz.py"]
        args:
          - --input-dir
          - /scratch/sources/kobo
          - --output-dir
          - /scratch/incoming/manga
          - --min-size
          - "50"
          # Tool markers live on scratch (pod-ephemeral). Scratch starts
          # empty each run so epub2cbz's internal dedup becomes a no-op.
          - --marker-dir
          - /scratch/markers/manga
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi
        volumeMounts:
          - name: scratch
            mountPath: /scratch

    - name: metadata-ebook
      synchronization:
        mutexes:
          - name: scratch-pvc
      container:
        image: ghcr.io/bendwyer/containers/ebook-metadata:2.0.2
        args:
          - --input-dir
          - /scratch/sources/kobo
          - --output-dir
          - /books/library/ebooks
          - --marker-dir
          - /scratch/markers/kobo
          - --provider
          - kobo
          - --country
          - de
          - --language
          - en
          - --skip-large
          - "50"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi
        volumeMounts:
          - name: scratch
            mountPath: /scratch
          - name: library
            mountPath: /books
          - name: tmp
            mountPath: /tmp

    # Agent-decides + bundle-aware apply for the kobo manga lane. Agent runs
    # with --lane manga which prefers MangaBaka (covers regular manga issues)
    # with ComicVine as fallback (covers manga omnibuses, which MangaBaka
    # indexes less reliably). apply.py routes the comictagger save call to
    # the right --source based on each decision's recorded source.
    - name: metadata-manga
      synchronization:
        mutexes:
          - name: scratch-pvc
      container:
        image: ghcr.io/bendwyer/containers/comics-metadata-agent:0.3.10@sha256:280bd4a1badce4fdb7d641f444bd25e14992324dbf3963502c23b51b4d61f31b
        command: ["sh", "-c"]
        env:
          - name: HOME
            value: /tmp
        args:
          - |
            set -e
            umask 022
            ls /scratch/incoming/manga/*.cbz >/dev/null 2>&1 || { echo "No .cbz files to process"; exit 0; }

            cat > /tmp/source.json <<'EOF'
            {
              "source_id": "kobo",
              "source_title": "Kobo (rolling)"
            }
            EOF

            python -B /app/agent.py \
              --staging-dir /scratch/incoming/manga \
              --lane manga \
              --source-context /tmp/source.json \
              --decision-log-dir /books/library/.agent-decisions/manga \
              --kavita-url http://kavita.books.svc.cluster.local:5000 \
              --kavita-api-key-file /secret/kavita/credential \
              --comicvine-api-key-file /secret/comicvine/credential \
              --anthropic-credential-file /secret/anthropic/credential \
              --model claude-sonnet-4-6

            python -B /app/apply.py \
              --source-id kobo \
              --lane manga \
              --staging-dir /scratch/incoming/manga \
              --decision-log-dir /books/library/.agent-decisions/manga \
              --kavita-url http://kavita.books.svc.cluster.local:5000 \
              --kavita-api-key-file /secret/kavita/credential \
              --comicvine-api-key-file /secret/comicvine/credential

            if ls /scratch/incoming/manga/*.cbz >/dev/null 2>&1; then
              mkdir -p /books/incoming/manga/_unmatched
              for f in /scratch/incoming/manga/*.cbz; do
                base=$(basename "$f")
                if mv "$f" "/books/incoming/manga/_unmatched/$base"; then
                  echo "Dead-lettered (agent uncertain or skipped): $base"
                else
                  echo "Warning: failed to move to _unmatched: $f" >&2
                fi
              done
            fi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 200m
            memory: 1Gi
          limits:
            memory: 1Gi
        volumeMounts:
          - name: scratch
            mountPath: /scratch
          - name: library
            mountPath: /books
          - name: kavita-secret
            mountPath: /secret/kavita
            readOnly: true
          - name: comicvine-secret
            mountPath: /secret/comicvine
            readOnly: true
          - name: anthropic-secret
            mountPath: /secret/anthropic
            readOnly: true
          - name: tmp
            mountPath: /tmp

    # archive: bulk copy + bulk check. rclone's `check` command requires
    # both args to be directory roots; per-file check against an object
    # path fails with "is a file not a directory".
    - name: archive
      container:
        image: rclone/rclone:1.73.5
        command: ["sh", "-c"]
        args:
          - |
            set -eu
            src=/scratch/sources/kobo
            if [ ! -d "$src" ] || [ -z "$(ls -A "$src" 2>/dev/null)" ]; then
              echo "No source files to archive"
              exit 0
            fi
            count=$(find "$src" -maxdepth 1 -type f | wc -l)
            dest="archive:$ARCHIVE_BUCKET/books/kobo/"
            echo "[archive] $count files: $src -> $dest"
            rclone copy "$src" "$dest" \
              --s3-no-check-bucket \
              --s3-storage-class=STANDARD_IA \
              --stats-one-line --stats=30s --transfers=4
            rclone check "$src" "$dest" --one-way
            echo "archive verified: $count files"
        env:
          - name: RCLONE_CONFIG_ARCHIVE_TYPE
            value: "s3"
          - name: RCLONE_CONFIG_ARCHIVE_PROVIDER
            value: "Other"
          - name: RCLONE_CONFIG_ARCHIVE_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: ovhcloud-archive-home-s3
                key: access_key
          - name: RCLONE_CONFIG_ARCHIVE_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: ovhcloud-archive-home-s3
                key: secret_key
          - name: RCLONE_CONFIG_ARCHIVE_ENDPOINT
            valueFrom:
              secretKeyRef:
                name: ovhcloud-archive-home-s3
                key: endpoint
          - name: RCLONE_CONFIG_ARCHIVE_REGION
            valueFrom:
              secretKeyRef:
                name: ovhcloud-archive-home-s3
                key: region
          - name: ARCHIVE_BUCKET
            valueFrom:
              secretKeyRef:
                name: ovhcloud-archive-home-s3
                key: bucket
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi
        volumeMounts:
          - name: scratch
            mountPath: /scratch
