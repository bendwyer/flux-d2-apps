---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: sync-humble
  namespace: books
spec:
  schedule: "0 0 1 1 *"
  suspend: true
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: humble-cli
              image: ghcr.io/bendwyer/containers/humble-cli:0.23@sha256:153f2f42b2fce26e4360d1f85a68bd77264b93b07ee399bdd24c836876762cd5
              command: ["sh", "-c"]
              args:
                - |
                  export HOME=/tmp &&
                  humble-cli auth "$(cat /secret/credential)" &&
                  mkdir -p /books/sources/humble-bundle &&
                  cd /books/sources/humble-bundle &&
                  echo "$BUNDLE_KEY" > /tmp/bundles.txt &&
                  humble-cli bulk-download /tmp/bundles.txt --format pdf --format "pdf (hq)"
              env:
                - name: BUNDLE_KEY
                  value: "CHANGE_ME"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 512Mi
              volumeMounts:
                - name: config-secret
                  mountPath: /secret
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
                - name: library
                  mountPath: /books
          volumes:
            - name: config-secret
              secret:
                secretName: humble-credentials
            - name: tmp
              emptyDir: {}
            - name: library
              persistentVolumeClaim:
                claimName: library-shared-pvc
