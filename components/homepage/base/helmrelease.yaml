---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
  namespace: homepage
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: bjw-s
  values:
    controllers:
      homepage:
        containers:
          app:
            image:
              repository: ghcr.io/gethomepage/homepage
              digest: sha256:b129cb0f674bd6d204e215bde2c2fc3f11d6ad0e82f6d20007cf80f74e1acbb1 # v1.11.0
              pullPolicy: IfNotPresent
            env:
              TZ: Europe/Berlin
              HOMEPAGE_ALLOWED_HOSTS: "*"
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 256Mi
            probes:
              liveness:
                enabled: true
                type: HTTP
                path: /api/healthcheck
                port: 3000
              readiness:
                enabled: true
                type: HTTP
                path: /api/healthcheck
                port: 3000
    serviceAccount:
      homepage:
        enabled: true
    service:
      homepage:
        controller: homepage
        ports:
          http:
            port: 3000
    persistence:
      config:
        type: configMap
        name: homepage
        globalMounts:
          - path: /app/config
      logs:
        type: emptyDir
        globalMounts:
          - path: /app/config/logs
