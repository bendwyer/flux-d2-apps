---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
  namespace: homepage
spec:
  interval: 1h
  values:
    configMaps:
      config:
        data:
          services.yaml: |
            - Infrastructure:
                - Omni:
                    href: "https://omni.bendwyer.cloud"
                    icon: "si-kubernetes"
                    description: "Cluster Management"
          widgets.yaml: |
            - kubernetes:
                cluster:
                  show: true
                  cpu: true
                  memory: true
                  showLabel: true
                  label: "omni"
                nodes:
                  show: true
                  cpu: true
                  memory: true
                  showLabel: true
